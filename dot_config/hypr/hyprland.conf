###########
### ENV ###
###########

# Ensure ~/.local/bin (chezmoi-managed scripts: hypr-screenshot,
# hypr-cheatsheet, etc.) is on PATH for everything Hyprland exec's.
# Hyprland's parent shell PATH does not include ~/.local/bin by default,
# which causes exec bindings to silently fail with no log output.
env = PATH,$HOME/.local/bin:$HOME/.cargo/bin:$HOME/.nix-profile/bin:/nix/var/nix/profiles/default/bin:/usr/local/sbin:/usr/local/bin:/usr/bin:/usr/lib/jvm/default/bin:/usr/bin/site_perl:/usr/bin/vendor_perl:/usr/bin/core_perl

# XDG desktop identification — some apps (and portals) misbehave if these
# aren't explicitly set, even though display managers usually do it. Belt
# and suspenders.
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

################
### MONITORS ###
################

# Setup monitors
# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=desc:Acer Technologies KA272 0x13800DD9,1920x1080@74.97300,auto,1.0
monitor=desc:Acer Technologies KA272 0x13800FAE,1920x1080@74.97300,auto,1.0
monitor=eDP-1,preferred,auto,1.5

# Workspace assignments
# (workspace = N, monitor:desc:..., default:true — pins workspace N to a
# specific output and marks it as the default workspace for that monitor.)
workspace = 1, monitor:desc:Acer Technologies KA272 0x13800DD9, default:true
workspace = 2, monitor:desc:Acer Technologies KA272 0x13800DD9
workspace = 3, monitor:desc:Acer Technologies KA272 0x13800FAE, default:true
workspace = 4, monitor:desc:Acer Technologies KA272 0x13800FAE
workspace = 5, monitor:desc:Acer Technologies KA272 0x13800FAE
workspace = 6, monitor:eDP-1, default:true
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

$terminal = ghostty
$browser = firefox
$fileManager = thunar
$lock = hyprlock
$menu = wofi --show drun

#################
### AUTOSTART ###
#################

# Execute your favorite apps at launch.
#
# Portal env propagation: export Wayland/XDG vars to the systemd user
# session + D-Bus activation environment BEFORE portals get lazily
# activated by the first sandboxed app. `--all` covers WAYLAND_DISPLAY,
# XDG_CURRENT_DESKTOP, XCURSOR_*, QT_QPA_PLATFORMTHEME, GTK_THEME, etc.
# in one shot (replaces the old killall+restart workaround).
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment --all

# Polkit authentication agent (handles GUI password prompts for any app
# that needs elevated privileges). hyprpolkitagent ships a systemd user
# service, but its WantedBy=graphical-session.target only triggers under
# UWSM. Without UWSM we kick it manually here.
exec-once = systemctl --user start hyprpolkitagent.service

exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = hyprpaper
exec-once = wl-paste --type text  --watch cliphist store   # clipboard history (text)
exec-once = wl-paste --type image --watch cliphist store   # clipboard history (images)

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

general {
    # https://wiki.hyprland.org/Configuring/Variables/#general

    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # Catppuccin Mocha: yellow→peach gradient (echoes the moon + sunset in the
    # wallpaper). Inactive: surface0.
    col.active_border = rgba(f9e2afaa) rgba(fab387aa) 45deg
    col.inactive_border = rgba(313244aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Dwindle-Layout/
dwindle {
    preserve_split = true
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.17
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        # false = "down is down", true = "down is up"
        natural_scroll = false
    }

}

# https://wiki.hypr.land/Configuring/Advanced-and-Cool/Gestures/
# 3-finger horizontal swipe on the touchpad switches workspaces.
# (Modern syntax — v0.49+. Old `gestures { workspace_swipe = true }` was removed.)
gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, return, exec, $terminal  #open the terminal
bind = $mainMod, B, exec, $browser # open the browser
bind = $mainMod, Q, killactive, # close the active window
bind = $mainMod, M, exec, wlogout --protocol layer-shell # show the logout window
# (Removed Super+Shift+M = exit — too close to the wlogout bind, easy to
# mishit. Use wlogout's "Exit" tile if you need to terminate Hyprland.)
bind = $mainMod, E, exec, $fileManager # Show the graphical file browser
bind = $mainMod, T, togglefloating, # toggle window float / tile
bind = $mainMod, SPACE, exec, wofi # Show the graphicall app launcher
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, Y, layoutmsg, togglesplit # dwindle
bind = $mainMod, F, fullscreen
bind = $mainMod, I, exec, ghostty --class=nmtui -e nmtui # open the network manager
bind = $mainMod, W, exec, $HOME/.local/bin/win # smart launcher for the win11 KVM VM (starts + attaches virt-viewer)
bind = $mainMod SHIFT, slash, exec, $HOME/.local/bin/laptop-docs # Super+? → open laptop reference site (mdBook). Displaced the previous `movewindow mon:eDP-1` bind below — restore it if you want the comma/period/slash monitor-movement symmetry back.

# Screenshots: grim + slurp save to ~/Pictures/Screenshots, then swappy opens for
# annotation. swappy can re-save or copy to clipboard.
bind = $mainMod, S, exec, $HOME/.local/bin/hypr-screenshot region            # screenshot region → annotate
bind = $mainMod SHIFT, S, exec, $HOME/.local/bin/hypr-screenshot window      # screenshot window → annotate
bind = $mainMod CTRL, S, exec, $HOME/.local/bin/hypr-screenshot output       # screenshot monitor → annotate

# Lock screen
bind = $mainMod, escape, exec, $lock                                           # lock the screen

# Clipboard history (cliphist + wofi with image thumbnails)
bind = $mainMod, V, exec, cliphist-menu                                        # clipboard history
bind = $mainMod SHIFT, V, exec, cliphist wipe                                  # wipe clipboard history

# Color picker (copies hex to clipboard)
bind = $mainMod SHIFT, C, exec, hyprpicker -a                                  # pick color under cursor

# Keybind cheatsheet
bind = $mainMod, semicolon, exec, $HOME/.local/bin/hypr-cheatsheet                              # show keybind cheatsheet

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# Move window in workspace with mainMod + shift + vim keys

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d 

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Multi-monitor controls
bind = $mainMod, comma, focusmonitor, desc:Acer Technologies KA272 0x13800DD9
bind = $mainMod, period, focusmonitor, desc:Acer Technologies KA272 0x13800FAE
bind = $mainMod, slash, focusmonitor, eDP-1
bind = $mainMod SHIFT, comma, movewindow, mon:desc:Acer Technologies KA272 0x13800DD9
bind = $mainMod SHIFT, period, movewindow, mon:desc:Acer Technologies KA272 0x13800FAE
# bind = $mainMod SHIFT, slash, movewindow, mon:eDP-1  # displaced by Super+? → laptop-docs above
bind = $mainMod CTRL, comma, movecurrentworkspacetomonitor, desc:Acer Technologies KA272 0x13800DD9
bind = $mainMod CTRL, period, movecurrentworkspacetomonitor, desc:Acer Technologies KA272 0x13800FAE
bind = $mainMod CTRL, slash, movecurrentworkspacetomonitor, eDP-1
bind = $mainMod, Tab, swapactiveworkspaces, desc:Acer Technologies KA272 0x13800DD9 desc:Acer Technologies KA272 0x13800FAE

# Cycle workspaces on current monitor only
bind = $mainMod, bracketleft, workspace, m-1
bind = $mainMod, bracketright, workspace, m+1

# Special workspace (scratchpad)
bind = $mainMod, grave, togglespecialworkspace, scratch
bind = $mainMod SHIFT, grave, movetoworkspace, special:scratch

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Framework Brightness
bind = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-
bind = ,XF86MonBrightnessUp, exec, brightnessctl s +10%

# Framework Volume + Media
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle  # mic mute
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioPause,       exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous

# will switch to a submap called resize
bind = ALT, R, submap, resize

# will start a submap called "resize"
submap = resize

# sets repeatable binds for resizing the active window
binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10

# use reset to go back to the global submap
bind = , escape, submap, reset

# will reset the submap, which will return to the global submap
submap = reset

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrule = opacity 0.8 0.8, match:class ghostty
windowrule = opacity 0.8 0.8, match:class thunar
windowrule = opacity 0.9 0.9, match:class firefox
windowrule = opacity 0.8 0.8, match:class slack

# Win11 VM viewer — live on workspace 5 ("the Windows room").
# Class names cover both virt-viewer's startup-id ("virt-viewer") and
# the spice display class ("Virt-viewer"). Auth/confirmation dialogs
# ("Connect to ...") stay floating so they don't get stuffed into the tile.
windowrulev2 = workspace 5 silent, class:^([Vv]irt-viewer)$
windowrulev2 = float, class:^([Vv]irt-viewer)$, title:^(Connect to .*)$
