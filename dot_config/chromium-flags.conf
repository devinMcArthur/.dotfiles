# Chromium command-line flags, auto-applied by /usr/bin/chromium on Arch.
#
# Why: default Chromium on Hyprland/Wayland deadlocks during GPU init —
# `vaInitialize failed` + repeated `GetVSyncParametersIfAvailable failed`
# leave the renderer never reaching the page. Tilt's auto-open hangs as a
# result.
#
# Fix: tell Ozone to pick Wayland explicitly, drop the broken VA-API path.
# These flags are safe for both normal browsing and --app= mode.

--ozone-platform-hint=auto
--enable-features=WaylandWindowDecorations,UseOzonePlatform
--disable-features=VaapiVideoDecoder,VaapiVideoEncoder
