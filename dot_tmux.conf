# ~/.tmux.conf — chezmoi-managed.
# Hand-written replacement for gpakosz/oh-my-tmux. ~80 lines, no framework.
# Palette: Catppuccin Mocha (https://github.com/catppuccin/catppuccin).

# ---------- Sensible baseline ----------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# ---------- Behaviour ----------
set -g prefix C-a
unbind C-b
bind  C-a send-prefix

set  -g mouse on
set  -g base-index 1                  # windows 1-indexed
setw -g pane-base-index 1             # panes 1-indexed
set  -g renumber-windows on
set  -g focus-events on               # nvim autoread support
set  -sg escape-time 10               # snappy ESC

# Highlight windows with output in the status line (no popup, just visual mark).
set  -g monitor-activity on
set  -g visual-activity off

# True-color terminal (matches ghostty + nvim)
set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Undercurl + underline-color passthrough (nvim diagnostics, LSP squigglies).
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Pass through modified keys (Shift+Enter, Ctrl+Enter, etc.) to inner apps.
# `always` is more robust than `on` for nested SSH and wrappers like pi.
# csi-u format is the modern standard (kitty/ghostty/foot); pi requires it.
set -s  extended-keys always
set -s  extended-keys-format csi-u
set -as terminal-features "*:extkeys"

# OSC 52 system-clipboard integration (ghostty handles this natively, survives SSH).
set -g set-clipboard on

# Let inner apps emit raw escape sequences (kitty graphics in nvim image.nvim, etc.).
set -g allow-passthrough on

# Propagate Ghostty's marker env vars into new panes so apps (pi `show_image`,
# nvim image.nvim, etc.) can detect the outer terminal supports Kitty graphics.
# Without this, tmux masks TERM_PROGRAM=ghostty and inline images fall back to
# a [Image: ...] placeholder. Combined with allow-passthrough above, this gives
# real Ghostty-graphics rendering inside tmux panes.
set -ga update-environment 'GHOSTTY_RESOURCES_DIR'
set -ga update-environment 'GHOSTTY_BIN_DIR'
set -ga update-environment 'TERM_PROGRAM'
set -ga update-environment 'TERM_PROGRAM_VERSION'

# ---------- Keybinds ----------
bind & kill-window
bind x kill-pane

# Splits inherit cwd; replace defaults
unbind '"'
unbind %
bind '"' split-window -v -c "#{pane_current_path}"
bind %  split-window -h -c "#{pane_current_path}"

# Vim-style pane switching
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r ^ last-window

# Prefix + Ctrl-h/l: previous/next window (matches old oh-my-tmux muscle memory)
bind -r C-h previous-window
bind -r C-l next-window

# Reload config in place
bind r source-file ~/.tmux.conf \; display " config reloaded"

# Scratch popup terminal (prefix-less: Alt-g). Opens in current pane's cwd.
bind -n M-g display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# Sesh session picker (zoxide-aware). Requires `sesh` (AUR: sesh-bin) + fzf.
# Use plain `fzf` (not fzf-tmux) since display-popup already provides the popup.
# Guards against missing binary so the popup closes cleanly instead of hanging.
bind -N "sesh session picker" T display-popup -E -w 80% -h 70% "\
  if ! command -v sesh >/dev/null; then \
    echo 'sesh not installed. Run: yay -S sesh-bin fzf'; read -n1 -s; exit 0; \
  fi; \
  sesh connect \"\$(sesh list -t -c | fzf --no-border --prompt '⚡ ')\""

# ---------- Copy mode (vi) ----------
setw -g mode-keys vi
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

# ---------- Catppuccin Mocha palette ----------
# Define once, reference below. Keep all hex literals here.
%hidden CTP_BASE="#1e1e2e"
%hidden CTP_MANTLE="#181825"
%hidden CTP_CRUST="#11111b"
%hidden CTP_TEXT="#cdd6f4"
%hidden CTP_SUBTEXT0="#a6adc8"
%hidden CTP_OVERLAY0="#6c7086"
%hidden CTP_SURFACE0="#313244"
%hidden CTP_BLUE="#89b4fa"
%hidden CTP_MAUVE="#cba6f7"
%hidden CTP_PEACH="#fab387"
%hidden CTP_YELLOW="#f9e2af"
%hidden CTP_RED="#f38ba8"
%hidden CTP_GREEN="#a6e3a1"

# ---------- Status line ----------
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=$CTP_MANTLE,fg=$CTP_SUBTEXT0"

set -g status-left-length 40
set -g status-left  " #[fg=$CTP_BLUE,bold]#S #[fg=$CTP_OVERLAY0]· #h  "

set -g status-right-length 40
set -g status-right "#[fg=$CTP_OVERLAY0]%a %b %d  #[fg=$CTP_PEACH]%H:%M "

# Style options own the colors; format strings own only the layout.
# This lets window-status-activity-style actually take effect.
setw -g window-status-style           "fg=$CTP_OVERLAY0"
setw -g window-status-current-style  "fg=$CTP_BASE,bg=$CTP_MAUVE,bold"
setw -g window-status-activity-style  "fg=$CTP_PEACH,bold"
setw -g window-status-format          " #I #W "
setw -g window-status-current-format  " #I #W "
setw -g window-status-separator       ""

# ---------- Pane borders, messages, mode ----------
set -g pane-border-style        "fg=$CTP_SURFACE0"
set -g pane-active-border-style "fg=$CTP_MAUVE"
set -g message-style            "bg=$CTP_YELLOW,fg=$CTP_BASE,bold"
set -g message-command-style    "bg=$CTP_BASE,fg=$CTP_YELLOW,bold"
setw -g mode-style              "bg=$CTP_MAUVE,fg=$CTP_BASE,bold"

# ---------- Plugins ----------
set -g @plugin 'tmux-plugins/tmux-yank'      # system-clipboard integration
set -g @plugin 'tmux-plugins/tmux-resurrect' # save/restore sessions across reboots
set -g @plugin 'tmux-plugins/tmux-continuum' # auto-save every 15min, auto-restore on start

# continuum: auto-restore on tmux server start + auto-boot server at login
# (installs ~/.config/systemd/user/tmux.service on first plugin run).
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-save-interval '15'
# resurrect: also capture pane scrollback + nvim session files.
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
# Reject truncated saves (e.g. continuum's shutdown-race partial captures)
# by repointing `last` to the most recent healthy backup. See
# ~/.local/bin/tmux-resurrect-guard.sh and ~/.local/state/tmux-resurrect-guard.log.
set -g @resurrect-hook-post-save-all 'bash ~/.local/bin/tmux-resurrect-guard.sh'

# tpm — must remain at the very bottom.
run '~/.tmux/plugins/tpm/tpm'
